<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis-OS - Sport</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --accent-color: #ff9f0a;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #1c1c1e;
            --input-bg: #1c1c1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            padding-bottom: 90px;
            box-sizing: border-box;
        }

        header {
            padding: 4px 0 20px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-color);
            margin: 0;
        }

        .view-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        /* Encadré d'erreur de secours */
        #debugError {
            display: none;
            background-color: rgba(255, 69, 58, 0.2);
            border: 1px solid #ff453a;
            color: #ff453a;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            word-break: break-all;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 10px;
            margin-bottom: 16px;
            box-sizing: border-box;
            font-size: 16px;
            -webkit-appearance: none;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #000000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .log-list {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-item {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px 14px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75px;
            background-color: #0a0a0a;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            flex: 1;
            padding: 8px 0;
            font-size: 11px;
            font-weight: 500;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            margin-bottom: 5px;
            fill: currentColor;
        }

        .nav-item.active {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <header>
        <h1>Jarvis-OS</h1>
    </header>

    <h2 class="view-title">Suivi Sport</h2>
    
    <!-- Zone de texte cachée qui affichera l'erreur s'il y en a une -->
    <div id="debugError"></div>

    <div class="card">
        <div style="text-align: center; margin-bottom: 20px;">
            <span style="color: var(--text-muted); font-size: 14px;">Dernier poids enregistré</span>
            <div style="font-size: 32px; font-weight: bold; color: var(--accent-color); margin-top: 5px;">
                <span id="currentWeightDisplay">--</span> <span style="font-size: 18px;">kg</span>
            </div>
            <p id="weightDiffDisplay" style="font-size: 12px; margin-top: 4px; color: var(--text-muted);"></p>
        </div>

        <form id="weightForm" action="#" onsubmit="saveWeight(event)">
            <label for="weightInput">Nouvelle pesée (kg) :</label>
            <input type="number" step="0.1" placeholder="Ex: 75.8" id="weightInput" inputmode="decimal" required>
            <button type="submit" class="btn-submit" id="btnSubmit">Enregistrer le poids</button>
        </form>
    </div>

    <h3 style="font-size: 16px; font-weight: 600; margin-top: 25px; margin-bottom: 10px;">Historique des pesées</h3>
    <div class="log-list" id="weightLogList"></div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
            <span>Planning</span>
        </a>
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
            <span>Bourse</span>
        </a>
        <a href="sport.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-3V3.5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5V5H8c-1.1 0-2 .9-2 2v4H3.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5H6v4c0 1.1.9 2 2 2h3v1.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h3c1.1 0 2-.9 2-2v-4h1.5c.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5z"/></svg>
            <span>Sport</span>
        </a>
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.3C.4 6.6.9 9.7 2.9 11.6c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
            <span>Mécanique</span>
        </a>
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <span>Budget</span>
        </a>
    </nav>

    <script>
        // Capte toutes les erreurs globales pour les afficher à l'écran
        window.onerror = function(msg, url, line) {
            const errDiv = document.getElementById('debugError');
            errDiv.style.display = 'block';
            errDiv.innerHTML = `⚠️ Error: ${msg} <br> Line: ${line}`;
            return false;
        };

        function showDebug(msg) {
            const errDiv = document.getElementById('debugError');
            errDiv.style.display = 'block';
            errDiv.innerHTML = `📢 Info: ${msg}`;
        }

        function saveWeight(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }

            try {
                const weightInput = document.getElementById('weightInput');
                const val = parseFloat(weightInput.value);
                
                if (!val || isNaN(val)) {
                    showDebug("Le poids saisi n'est pas un nombre valide.");
                    return false;
                }

                let weightHistory = [];
                const localData = localStorage.getItem('jarvis_weight');
                if (localData) {
                    weightHistory = JSON.parse(localData);
                }

                weightHistory.unshift({ date: new Date().toLocaleDateString('fr-FR'), weight: val });
                localStorage.setItem('jarvis_weight', JSON.stringify(weightHistory));
                
                weightInput.value = '';
                weightInput.blur(); 
                
                displayWeightLogs();
            } catch (err) {
                showDebug(`Erreur durant la sauvegarde : ${err.message}`);
            }
            return false;
        }

        function displayWeightLogs() {
            try {
                let weightHistory = [];
                const localData = localStorage.getItem('jarvis_weight');
                if (localData) {
                    weightHistory = JSON.parse(localData);
                }

                const currentDisplay = document.getElementById('currentWeightDisplay');
                const diffDisplay = document.getElementById('weightDiffDisplay');
                const logList = document.getElementById('weightLogList');
                
                logList.innerHTML = '';
                
                if(weightHistory && weightHistory.length > 0) {
                    currentDisplay.innerText = weightHistory[0].weight;
                    if(weightHistory.length > 1) {
                        const diff = (weightHistory[0].weight - weightHistory[1].weight).toFixed(1);
                        diffDisplay.innerText = diff > 0 ? `+${diff} kg depuis la dernière pesée` : `${diff} kg depuis la dernière pesée`;
                    } else {
                        diffDisplay.innerText = "Première pesée enregistrée.";
                    }
                } else {
                    currentDisplay.innerText = "--";
                    diffDisplay.innerText = "Aucune donnée enregistrée.";
                }

                if(Array.isArray(weightHistory)) {
                    weightHistory.forEach(item => {
                        logList.innerHTML += `<div class="log-item"><span>📅 ${item.date}</span><strong>${item.weight} kg</strong></div>`;
                    });
                }
            } catch (err) {
                showDebug(`Erreur d'affichage de l'historique : ${err.message}`);
            }
        }

        window.onload = function() {
            displayWeightLogs();
        };
    </script>
</body>
</html>
