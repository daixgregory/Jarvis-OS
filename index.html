<!-- Remplace la section script dans ton index.html par celle-ci -->
<script>
    let db = JSON.parse(localStorage.getItem('jarvis_db')) || { 
        salary: 0, immo: 200000, bourse: 15000, cash: 5000, taxProvision: 0.20 
    };

    function updateFinance() {
        // Récupère la valeur du champ salaire
        let input = document.getElementById('incomeInput');
        if(input) db.salary = parseFloat(input.value) || 0;
        
        // Calcul du "Graal" (Valeur Nette)
        const afterTax = db.salary * (1 - db.taxProvision);
        const total = db.immo + db.bourse + db.cash + afterTax;
        
        // Affiche la valeur dans la carte
        document.getElementById('netValueDisplay').innerText = total.toLocaleString() + ' €';
        localStorage.setItem('jarvis_db', JSON.stringify(db));
    }

    // Force l'affichage au chargement pour ne plus avoir "0 €"
    window.onload = () => {
        let input = document.getElementById('incomeInput');
        if(input) input.value = db.salary;
        updateFinance();
    };
</script>
