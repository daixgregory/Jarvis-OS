<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS SPORT</title>

<style>
body{
background:#020b24;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1{
font-size:60px;
color:#6bb6ff;
margin-bottom:0;
}

.card{
background:#07163f;
border:1px solid #163f8f;
border-radius:30px;
padding:25px;
margin-top:25px;
}

.value{
font-size:60px;
font-weight:bold;
color:#6bb6ff;
}

input{
width:100%;
padding:15px;
font-size:20px;
border-radius:15px;
border:none;
margin-top:15px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
font-size:20px;
border:none;
border-radius:15px;
background:#2d8cff;
color:white;
font-weight:bold;
}

ul{
font-size:22px;
line-height:1.8;
}
</style>
</head>

<body>

<h1>🏋️ SPORT</h1>
<p>Suivi physique & progression</p>

<div class="card">
<h2>Poids actuel</h2>

<div class="value" id="weightDisplay">82 kg</div>

<input
type="number"
step="0.1"
id="weightInput"
placeholder="Nouveau poids">

<button onclick="saveWeight()">
Enregistrer
</button>

</div>

<div class="card">
<h2>Objectif</h2>

<p>Recomposition corporelle</p>
<p>Prise de muscle + perte de gras</p>
</div>

<div class="card">
<h2>Programme du jour</h2>

<ul>
<li>Développé couché haltères</li>
<li>Rowing barre</li>
<li>Curl barre EZ</li>
<li>Extensions triceps</li>
<li>Abdominaux</li>
</ul>

</div>

<script>

function saveWeight(){

const value =
document.getElementById("weightInput").value;

if(value==="") return;

localStorage.setItem(
"jarvis_weight",
value
);

document.getElementById(
"weightDisplay"
).innerHTML = value + " kg";

}

window.onload = function(){

const saved =
localStorage.getItem("jarvis_weight");

if(saved){

document.getElementById(
"weightDisplay"
).innerHTML = saved + " kg";

}

}

</script>

</body>
</html>
