<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS-OS | Système Central</title>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #8b5cf6; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        .view { display: none; padding: 20px; }
        .view.active { display: block; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #000; border-top: 1px solid #333; padding: 15px 0; }
        button { background: none; border: none; color: #fff; font-size: 24px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div id="planning" class="view active">
    <h3>Cockpit Global</h3>
    <div class="card"><h1 id="netValue">0 €</h1><p>Valeur Nette Totale</p></div>
    <div id="taskList"></div>
</div>

<div id="bourse" class="view">
    <h3>Investissements</h3>
    <div class="card">
        <input type="number" id="etfInput" placeholder="Valeur ETF (€)">
        <button class="btn-main" onclick="saveAsset()">Enregistrer</button>
    </div>
</div>

<div id="meca" class="view">
    <h3>Mécanique</h3>
    <div class="card">
        <input type="text" id="mecaDesc" placeholder="Intervention">
        <input type="number" id="mecaPrice" placeholder="Prix">
        <button class="btn-main" onclick="saveMeca()">Ajouter au Budget</button>
    </div>
</div>

<div id="budget" class="view">
    <h3>Budget</h3>
    <div id="budgetLog"></div>
</div>

<div class="nav">
    <button onclick="switchView('planning')">📅</button>
    <button onclick="switchView('bourse')">📈</button>
    <button onclick="switchView('meca')">🔧</button>
    <button onclick="switchView('budget')">💳</button>
</div>

<script>
    // MOTEUR D'ÉTAT UNIFIÉ
    let db = JSON.parse(localStorage.getItem('jarvis_data')) || { assets: 0, budget: [] };

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function saveAsset() {
        db.assets = parseFloat(document.getElementById('etfInput').value) || 0;
        localStorage.setItem('jarvis_data', JSON.stringify(db));
        render();
    }

    function saveMeca() {
        const desc = document.getElementById('mecaDesc').value;
        const price = parseFloat(document.getElementById('mecaPrice').value);
        db.budget.push({ desc, price });
        localStorage.setItem('jarvis_data', JSON.stringify(db));
        render();
    }

    function render() {
        // Mise à jour Planning
        document.getElementById('netValue').innerText = db.assets.toLocaleString() + ' €';
        // Mise à jour Budget
        document.getElementById('budgetLog').innerHTML = db.budget.map(item => 
            `<div class="card">${item.desc} : ${item.price} €</div>`).join('');
    }

    render(); // Initialisation immédiate
</script>
</body>
</html>
