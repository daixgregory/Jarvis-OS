<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS Planning V17</title>

<style>

body{
background:#020b24;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1{
font-size:60px;
color:#6bb6ff;
}

.card{
background:#07163f;
border:1px solid #163f8f;
border-radius:25px;
padding:20px;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:10px;
border:none;
border-radius:15px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:20px;
font-size:22px;
font-weight:bold;
background:#3d89ff;
color:white;
}

.task{
background:#0b1f52;
padding:15px;
margin-top:10px;
border-radius:15px;
}

small{
color:#8dbbff;
}

#resume{
font-size:20px;
line-height:1.8;
}

</style>

</head>

<body>

<h1>📅 PLANNING</h1>

<div class="card">

<h2>Nouvelle tâche</h2>

<input id="nom" placeholder="Nom de la tâche">

<input id="date" type="date">

<input id="heure" type="time">

<input id="duree" type="number" placeholder="Durée en minutes">

<button onclick="ajouterTache()">
Ajouter
</button>

</div>

<div class="card">

<h2>📊 Résumé du jour</h2>

<div id="resume">

0 tâche

</div>

</div>

<div class="card">

<h2>Tâches enregistrées</h2>

<div id="liste"></div>

</div>

<script>

let taches =
JSON.parse(localStorage.getItem("jarvisPlanning"))
|| [];

function sauvegarder(){
localStorage.setItem(
"jarvisPlanning",
JSON.stringify(taches)
);
}

function afficher(){

let html="";

taches.forEach((t,index)=>{

html += `
<div class="task">

<b>${t.nom}</b><br>

<small>
📅 ${t.date}
<br>
🕒 ${t.heure}
<br>
⏱️ ${t.duree} min
</small>

</div>
`;

});

let totalMinutes = 0;

taches.forEach(t => {
totalMinutes += Number(t.duree);
});

document.getElementById("resume").innerHTML =
`
<b>${taches.length}</b> tâche(s)<br>
<b>${totalMinutes}</b> minutes planifiées<br>
<b>${(totalMinutes/60).toFixed(1)}</b> heures occupées
`;

document.getElementById("liste").innerHTML = html;

}

function ajouterTache(){

let nom =
document.getElementById("nom").value;

let date =
document.getElementById("date").value;

let heure =
document.getElementById("heure").value;

let duree =
document.getElementById("duree").value;

if(
nom==="" ||
date==="" ||
heure==="" ||
duree==="")
{
return;
}

taches.push({
nom,
date,
heure,
duree
});

sauvegarder();

afficher();

document.getElementById("nom").value="";
document.getElementById("date").value="";
document.getElementById("heure").value="";
document.getElementById("duree").value="";

}

afficher();

</script>

</body>
</html>
