
<!DOCTYPE html>
<html lang='fr'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>JARVIS V9</title>
<style>
body{margin:0;background:#050913;color:#dbe7ff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
.header{background:#08101b;padding:20px;border-bottom:1px solid #1f3555;}
.title{font-size:30px;color:#63d4ff;font-weight:bold;}
.content{padding:18px;}
.card{background:#0b1220;border:1px solid #1d2a44;border-radius:18px;padding:18px;margin-bottom:18px;}
.card h2{margin-top:0;color:#63d4ff;}
input,select{width:100%;margin-top:10px;padding:14px;border-radius:12px;border:1px solid #28496d;background:#101827;color:white;box-sizing:border-box;}
button{width:100%;margin-top:12px;padding:14px;border-radius:12px;border:none;background:#17365e;color:white;font-size:16px;}
.task{background:#101827;border-left:4px solid #63d4ff;padding:14px;border-radius:12px;margin-bottom:12px;}
.delete{background:#4d1822;padding:8px;border-radius:8px;font-size:12px;border:none;color:white;}
.gantt{margin-top:12px;height:18px;border-radius:10px;background:#142238;overflow:hidden;}
.bar{height:100%;background:#63d4ff;}
.alert{background:#1a1115;border-left:4px solid #ff5c7a;color:#ff9cab;padding:14px;border-radius:12px;}
</style>
</head>
<body>

<div class='header'>
<div class='title'>JARVIS OS V9</div>
<div>Dynamic Cognitive System</div>
</div>

<div class='content'>

<div class='card'>
<h2>➕ Ajouter une tâche</h2>

<input type='text' id='taskName' placeholder='Nom de la tâche'>

<select id='taskCategory'>
<option>Travail</option>
<option>Sport</option>
<option>Urbanisme</option>
<option>Mécano</option>
<option>Investissements</option>
<option>Administratif</option>
</select>

<input type='number' id='taskDuration' placeholder='Durée (heures)'>

<button onclick='addTask()'>Ajouter la tâche</button>

</div>

<div class='card'>
<h2>📅 Planning Dynamique</h2>
<div id='taskList'></div>
</div>

<div class='card'>
<h2>🧠 Analyse Jarvis</h2>
<div class='alert' id='analysis'>🟢 Charge stable.</div>
</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem('jarvisTasks')) || [];

function saveTasks(){
 localStorage.setItem('jarvisTasks', JSON.stringify(tasks));
}

function renderTasks(){

 const list = document.getElementById('taskList');
 list.innerHTML = '';

 let totalHours = 0;

 tasks.forEach((task,index)=>{

  totalHours += Number(task.duration);

  const div = document.createElement('div');
  div.className = 'task';

  div.innerHTML = `
   <strong>${task.name}</strong><br>
   ${task.category} • ${task.duration}h
   <div class='gantt'>
    <div class='bar' style='width:${task.duration*10}%'></div>
   </div>
   <button class='delete' onclick='deleteTask(${index})'>Supprimer</button>
  `;

  list.appendChild(div);
 });

 const analysis = document.getElementById('analysis');

 if(totalHours >= 10){
   analysis.innerHTML = '🔴 Surcharge cognitive importante détectée.';
 }else if(totalHours >= 6){
   analysis.innerHTML = '🟠 Charge mentale modérée détectée.';
 }else{
   analysis.innerHTML = '🟢 Charge opérationnelle stable.';
 }
}

function addTask(){

 const name = document.getElementById('taskName').value;
 const category = document.getElementById('taskCategory').value;
 const duration = document.getElementById('taskDuration').value;

 if(!name || !duration){
   alert('Complète les champs.');
   return;
 }

 tasks.push({name,category,duration});

 saveTasks();
 renderTasks();

 document.getElementById('taskName').value = '';
 document.getElementById('taskDuration').value = '';
}

function deleteTask(index){
 tasks.splice(index,1);
 saveTasks();
 renderTasks();
}

renderTasks();

</script>

</body>
</html>
